services:
  # Render auto-deploys this when you push to GitHub
  - type: web
    name: ai-chatbot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set in Render dashboard — never commit this
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: HARDWARE_TIER
        value: A
